<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ExamPro Plus</title>
    <!-- Modern Font: Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="standalone-wrapper fade-in">
        <div class="card login-card">
            <h2><i class="fa-solid fa-graduation-cap"></i> ExamPro</h2>
            <p style="color: var(--text-muted); margin-bottom: 30px;">Sign in to access the system</p>
            <form method="POST">
                <div class="form-group">
                    <label style="display:block; margin-bottom:8px; font-weight:500; color:var(--text-muted);">Email Address</label>
                    <input type="email" name="email" placeholder="admin@example.com" required>
                </div>
                <div class="form-group" style="margin-bottom: 30px;">
                    <label style="display:block; margin-bottom:8px; font-weight:500; color:var(--text-muted);">Password</label>
                    <input type="password" name="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn"><i class="fa-solid fa-right-to-bracket"></i> Login Securely</button>
            </form>
        </div>
    </div>
</body>
</html>
